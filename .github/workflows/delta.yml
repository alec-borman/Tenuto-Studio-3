name: Delta Tracking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  TARGET_FILE: sprint_tenuto.tela

jobs:
  delta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tenuto
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone Tela Repo
        run: git clone https://github.com/alec-borman/tela.git tela-repo

      - name: Build telac
        run: |
          cd tela-repo
          cargo build --release
          echo "$(pwd)/target/release" >> $GITHUB_PATH

      - name: Compute Delta
        run: |
          # telac delta <codebase> <blueprint>
          telac delta . ${{ env.TARGET_FILE }} > delta_report.txt
          cat delta_report.txt

      - name: Post Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('delta_report.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Tela Delta Report\n\n\`\`\`\n${report}\n\`\`\``
            })
